services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: apolla
    ports:
      - '5432:5432'
    volumes:
      - apolla_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # Distributed job queue broker (S16). Set REDIS_URL=redis://localhost:6379 to run web + worker
  # in distributed mode; unset → in-process (no Redis needed).
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  apolla_pg:
